<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Sergio 3D Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border: 1px solid #444; }
        h2 { color: #00ff88; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { text-align: center; color: #aaa; font-size: 12px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #00ff88; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #3d3d3d; color: white; }
        button { width: 100%; padding: 15px; background: #00ff88; color: #1a1a1a; border: none; border-radius: 10px; margin-top: 25px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: scale(1.02); }
        .result { background: #3d3d3d; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: center; border: 1px dashed #00ff88; }
        .price { font-size: 32px; color: #00ff88; font-weight: bold; margin: 10px 0; }
        .meta { font-size: 14px; color: #00f2ff; margin-top: 10px; font-weight: 500; }
        .info-cuota { font-size: 11px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sergio 3D Lab</h2>
    <div class="subtitle">Gestión de Costos - Córdoba, Arg.</div>
    
    <label>Mes de Venta:</label>
    <select id="mesSeleccionado">
        <option value="144800">Marzo (Cuota: $144.800)</option>
        <option value="241318">Abril/Mayo/Junio (Cuota: $241.318)</option>
        <option value="183633">Julio/Agosto/Sept (Cuota: $183.633)</option>
    </select>

    <label>Peso de la pieza (gramos):</label>
    <input type="number" id="peso" placeholder="Ver en Bambu Studio" value="0">

    <label>Tiempo de impresión (horas):</label>
    <input type="number" id="tiempo" placeholder="Ej: 1.5" value="0">

    <label>Costo del rollo (1kg):</label>
    <input type="number" id="costoRollo" value="22000">

    <button onclick="calcular()">CALCULAR PRESUPUESTO</button>

    <div class="result">
        <div>Precio Sugerido al Cliente:</div>
        <div class="price" id="total">$ 0.00</div>
        <div class="meta" id="metaCuota">Cargá datos para ver objetivo</div>
        <div class="info-cuota" id="detalleMes"></div>
    </div>
</div>

<script>
function calcular() {
    const peso = parseFloat(document.getElementById('peso').value);
    const tiempo = parseFloat(document.getElementById('tiempo').value);
    const costoRollo = parseFloat(document.getElementById('costoRollo').value);
    const cuotaMes = parseFloat(document.getElementById('mesSeleccionado').value);
    
    // FÓRMULA MEJORADA PARA TU BAMBU A1
    const costoMaterial = (costoRollo / 1000) * peso;
    const costoEnergiaDesgaste = tiempo * 400; // Ajustado por inflación luz Cba
    const manoObraConfig = 2000; // Tu tiempo vale, Sergio!
    
    const costoBaseProduccion = costoMaterial + costoEnergiaDesgaste + manoObraConfig;
    
    // Multiplicador x3 para cubrir cuota y tener ganancia neta
    const precioFinal = costoBaseProduccion * 3; 
    const gananciaNetaPorPieza = precioFinal - costoBaseProduccion;
    
    document.getElementById('total').innerText = '$ ' + precioFinal.toLocaleString('es-AR', {minimumFractionDigits: 0});
    
    // Cálculo de cuántas piezas iguales pagarían el total del mes
    const unidadesParaCuota = Math.ceil(cuotaMes / gananciaNetaPorPieza);
    
    document.getElementById('metaCuota').innerText = "Vender " + unidadesParaCuota + " iguales paga TODO el mes";
    document.getElementById('detalleMes').innerText = "Objetivo mensual: $" + cuotaMes.toLocaleString('es-AR');
}
</script>

</body>
</html>
