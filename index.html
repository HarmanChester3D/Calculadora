<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Miau 3D Lab</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: white; padding: 20px; display: flex; justify-content: center; }
        .card { background: #2d2d2d; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border: 1px solid #444; }
        h2 { color: #00ff88; text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { text-align: center; color: #aaa; font-size: 12px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #00ff88; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #3d3d3d; color: white; }
        button { width: 100%; padding: 15px; background: #00ff88; color: #1a1a1a; border: none; border-radius: 10px; margin-top: 25px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00cc6e; transform: scale(1.02); }
        .result { background: #3d3d3d; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: center; border: 1px dashed #00ff88; }
        .price-label { color: #aaa; font-size: 14px; }
        .price { font-size: 32px; color: #00ff88; font-weight: bold; margin: 10px 0; }
        .details { font-size: 12px; color: #888; margin-top: 10px; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sergio 3D Lab</h2>
    <div class="subtitle">Presupuestador Profesional - Córdoba</div>
    
    <label>Peso de la pieza (gramos):</label>
    <input type="number" id="peso" placeholder="Gramos totales" value="0">

    <label>Tiempo de impresión (horas):</label>
    <input type="number" id="tiempo" placeholder="Horas de máquina" value="0">

    <label>Costo del rollo (1kg):</label>
    <input type="number" id="costoRollo" value="22000">

    <button onclick="calcular()">GENERAR PRESUPUESTO</button>

    <div class="result">
        <div class="price-label">Precio Final Sugerido:</div>
        <div class="price" id="total">$ 0</div>
        <div class="details" id="desglose"></div>
    </div>
</div>

<script>
function calcular() {
    const peso = parseFloat(document.getElementById('peso').value);
    const tiempo = parseFloat(document.getElementById('tiempo').value);
    const costoRollo = parseFloat(document.getElementById('costoRollo').value);
    
    // Costos base
    const mat = (costoRollo / 1000) * peso;
    const luz = tiempo * 400; // Costo operativo x hora
    const labor = 2000; // Valor fijo de preparación
    
    const costoTotal = mat + luz + labor;
    const sugerido = costoTotal * 3;
    
    document.getElementById('total').innerText = '$ ' + Math.round(sugerido).toLocaleString('es-AR');
    
    document.getElementById('desglose').innerHTML = 
        "• Material: $" + Math.round(mat) + "<br>" +
        "• Operativo: $" + Math.round(luz) + "<br>" +
        "• Preparación: $" + labor;
}
</script>

</body>
</html>
